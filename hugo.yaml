baseURL: "https://dynaxiaoxiao.github.io/pxgao-tj.github.io/"
languageCode: zh-cn
title: 宵的学习笔记
theme: stack

# 核心路径配置
params:
    mainSections:
        - post
    featuredImageField: image
    # 如果你想开启数学公式，加上这两行
    math:
        enable: true
    sidebar:
        emoji: 🎓
        subtitle: "天大数本 | 同济SE硕 | 大模型算法 | 多模态大模型 | 金融风控"
        # 添加下面这两行，可以让侧边栏显示文章总数和字数统计，很有成就感
        articleCount: true
        wordCount: true
       
    style:
        # 允许用户切换深色/浅色模式
        defaultMode: system 
        # 修改强调色（比如改成数学系严谨的蓝色）
        accentColor: "#2a7ae2"

menu:
